; Capsule Radar — Waveshare ESP32-S3-Touch-LCD-1.28
;
; Two environments:
;   esp32-s3-touch-lcd-128  -> real firmware (Arduino_GFX + LVGL), flashed to the board
;   native                  -> desktop LVGL simulator (SDL2), runs the same UI on the Mac
;
; Build/run the simulator:   pio run -e native -t exec
; Build/flash the device:    pio run -e esp32-s3-touch-lcd-128 -t upload

[env:esp32-s3-touch-lcd-128]
; pioarduino fork of the espressif32 platform (Arduino core 3.x / ESP-IDF 5.x).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1      ; generic S3; matches ESP32-S3R2 (2MB QSPI PSRAM / 16MB flash)
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; sim_main.cpp is desktop-only (has its own main() + SDL); keep it out of the firmware
build_src_filter = +<*> -<sim_main.cpp>

; ESP32-S3R2 (Waveshare ESP32-S3-Touch-LCD-1.28): QIO flash + QSPI (in-package 2 MB) PSRAM, 16 MB NOR
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.psram_type = qspi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1              ; USB-C is native ESP32-S3 USB (CDC over GPIO19/20):
    -DARDUINO_USB_CDC_ON_BOOT=1       ;   /dev/cu.usbmodem* shows up directly. Serial -> CDC.
    -DLV_CONF_INCLUDE_SIMPLE          ; LVGL does #include "lv_conf.h"
    -I${PROJECT_DIR}/include          ; ...and finds it here (PIO's auto include/ is not on the LIBRARY path)
    -std=gnu++17
build_unflags = -std=gnu++11

lib_deps =
    moononournation/GFX Library for Arduino @ 1.6.4   ; has Arduino_GC9A01 + Arduino_ESP32SPI
    lvgl/lvgl @ 8.4.0                                  ; lv_conf.h in include/ targets v8
    bblanchon/ArduinoJson @ ^7.0.4
    https://github.com/tzapu/WiFiManager.git
    bodmer/TJpg_Decoder                               ; JPEG decode for aircraft photos
; Notes:
; - lv_conf.h lives in include/ (added to the include path above).
; - Versions are pinned to a known-good combination for this panel; bump deliberately.
; - No XPowersLib (no PMIC), no audio codec lib (no ES8311), no RTC lib (no PCF85063) on this kit.

; --- OTA upload (flash over WiFi) -------------------------------------------
; Device must be powered and on WiFi. Then:  pio run -e esp32-s3-touch-lcd-128-ota -t upload
[env:esp32-s3-touch-lcd-128-ota]
extends = env:esp32-s3-touch-lcd-128
upload_protocol = espota
upload_port = capsuleradar.local

; --- Desktop LVGL simulator (SDL2) -------------------------------------------
[env:native]
platform = native
; Only the portable UI + the SDL sim main; no Arduino_GFX / WiFi / device code.
build_src_filter = -<*> +<radar_view.cpp> +<ui.cpp> +<route.cpp> +<photo.cpp> +<coastline.cpp> +<airports.cpp> +<sim_main.cpp>
build_flags =
    !sdl2-config --cflags --libs      ; SDL2 include/lib flags (Homebrew sdl2)
    -DLV_CONF_INCLUDE_SIMPLE
    -I${PROJECT_DIR}/include
    -DLV_LOG_PRINTF=1
    -std=gnu++17
lib_deps =
    lvgl/lvgl @ 8.4.0
