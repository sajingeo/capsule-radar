; Capsule Radar — multi-board firmware (one source tree, two hardware targets).
;
; Boards:
;   esp32-s3-touch-lcd-128  -> Waveshare ESP32-S3-Touch-LCD-1.28 (240x240 GC9A01, CST816S, ETA6096)
;   esp32-s3-amoled-175     -> Waveshare ESP32-S3-Touch-AMOLED-1.75 (466x466 CO5300, CST9217, AXP2101, ES8311)
;
; Each device env sets a unique -DBOARD_* macro; src/config.h dispatches the pin
; map, screen size, UI scale, and feed protocol based on which one is defined.
; The peripheral .cpp files (display, touch_*, battery, audio, rtc_*) include
; the driver code for both boards inside their own #if BOARD_* / #elif blocks,
; so a single build_src_filter is enough — we don't gate files per env.
;
; Build/run the simulator:           pio run -e native -t exec
; Build/flash the LCD-1.28 device:   pio run -e esp32-s3-touch-lcd-128 -t upload
; Build/flash the AMOLED device:     pio run -e esp32-s3-amoled-175    -t upload

[device_common]
; pioarduino fork of the espressif32 platform (Arduino core 3.x / ESP-IDF 5.x).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1      ; generic S3; flash size + PSRAM type are set per-env
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
build_src_filter = +<*> -<sim_main.cpp>      ; sim_main.cpp is desktop-only
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DLV_CONF_INCLUDE_SIMPLE
    -I${PROJECT_DIR}/include
    -std=gnu++17
build_unflags = -std=gnu++11
lib_deps =
    moononournation/GFX Library for Arduino @ 1.6.4
    lvgl/lvgl @ 8.4.0
    bblanchon/ArduinoJson @ ^7.0.4
    https://github.com/tzapu/WiFiManager.git
    bodmer/TJpg_Decoder

; --- ESP32-S3-Touch-LCD-1.28 (default for this fork's hardware) -----
[env:esp32-s3-touch-lcd-128]
extends = device_common
board_build.arduino.memory_type = qio_qspi   ; ESP32-S3R2 has 2 MB in-package QSPI PSRAM
board_build.flash_mode = qio
board_build.psram_type = qspi
build_flags =
    ${device_common.build_flags}
    -DBOARD_LCD_128=1
    -DARDUINO_USB_MODE=1                     ; native S3 USB-CDC (the LCD-128 USB-C is wired to GPIO19/20)
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32-s3-touch-lcd-128-ota]
extends = env:esp32-s3-touch-lcd-128
upload_protocol = espota
upload_port = capsuleradar.local

; --- ESP32-S3-Touch-AMOLED-1.75 -------------------------------------
[env:esp32-s3-amoled-175]
extends = device_common
board_build.arduino.memory_type = qio_opi    ; ESP32-S3R8 has 8 MB OPI PSRAM
board_build.flash_mode = qio
board_build.psram_type = opi
build_flags =
    ${device_common.build_flags}
    -DBOARD_AMOLED_175=1
    -DARDUINO_USB_MODE=1                     ; AMOLED kit also exposes native S3 USB
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    ${device_common.lib_deps}
    lewisxhe/XPowersLib                      ; AXP2101 PMIC; AMOLED-only

[env:esp32-s3-amoled-175-ota]
extends = env:esp32-s3-amoled-175
upload_protocol = espota
upload_port = capsuleradar.local

; --- Desktop LVGL simulator (SDL2) ----------------------------------
; Builds against board-agnostic UI/render code; the simulator window adapts to
; whichever board is selected via -DBOARD_* (defaults to LCD-128 if neither set).
[env:native]
platform = native
build_src_filter = -<*> +<radar_view.cpp> +<ui.cpp> +<route.cpp> +<photo.cpp> +<coastline.cpp> +<airports.cpp> +<sim_main.cpp>
build_flags =
    !sdl2-config --cflags --libs
    -DLV_CONF_INCLUDE_SIMPLE
    -DBOARD_LCD_128=1                        ; sim defaults to the smaller layout (override at the cmdline if needed)
    -I${PROJECT_DIR}/include
    -DLV_LOG_PRINTF=1
    -std=gnu++17
lib_deps =
    lvgl/lvgl @ 8.4.0
